# Healenium configuration properties

# Enable or disable healing
# default: true
heal-enabled = false

# Number of attempts to heal a locator
# default: 1
recovery-tries = 1

# Minimum score (0 to 1) for a locator to be considered a match
# default: 0.6
score-cap = 0.6

# Healenium backend server URL
# default: http://localhost:7878
hlm.server.url = http://localhost:7878

# Healenium imitator server URL
# default: http://localhost:8000
hlm.imitator.url = http://localhost:8000
